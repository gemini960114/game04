<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精品商品展示 | Premium Gallery</title>
    <meta name="description" content="探索我們精選的頂級商品，體驗極致工藝與美學的結合。">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 背景微光效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, transparent 70%);
            opacity: 0.3;
            z-index: -1;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* 商品網格 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        /* 商品卡片 */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 15px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .image-container {
            width: 100%;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            background: #151518;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .product-price {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: block;
        }

        .btn-add {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        /* 購物車通知 */
        #notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(150%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            pointer-events: none;
        }

        #notification.show {
            transform: translateY(0);
        }

        /* 動畫 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .product-grid { gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>精品生活指南</h1>
        <p>探索專屬您的質感配件，精選來自世界各地的卓越品味。</p>
    </header>

    <main class="container">
        <div class="product-grid" id="productGrid">
            <!-- JavaScript 會動態生成內容 -->
        </div>
    </main>

    <div id="notification">已成功加入購物車！</div>

    <script>
        const products = [
            {
                name: "極簡美學後背包",
                price: "NT$ 3,200",
                image: "images/dmytro-koplyk-QKMvmlt_NdU-unsplash.jpg"
            },
            {
                name: "經典手工皮鞋",
                price: "NT$ 5,800",
                image: "images/adrian-valverde-9SZn34Dc6yU-unsplash.jpg"
            },
            {
                name: "高解析耳機",
                price: "NT$ 4,500",
                image: "images/edmund-lou-WEbaj0JmUHU-unsplash.jpg"
            },
            {
                name: "專業數碼相機",
                price: "NT$ 21,000",
                image: "images/glen-carrie-cZYjjCD83vo-unsplash.jpg"
            },
            {
                name: "商務時尚手錶",
                price: "NT$ 8,900",
                image: "images/shiv-d-pDQfIW8kZiw-unsplash.jpg"
            },
            {
                name: "北歐風皮革配件",
                price: "NT$ 1,200",
                image: "images/00001.png"
            },
            {
                name: "復古設計墨鏡",
                price: "NT$ 2,600",
                image: "images/zhen-yao-qm7NBkrIrX8-unsplash.jpg"
            }
        ];

        const productGrid = document.getElementById('productGrid');
        const notification = document.getElementById('notification');

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="image-container">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                </div>
                <div class="product-info">
                    <h3>${product.name}</h3>
                    <span class="product-price">${product.price}</span>
                    <button class="btn-add" onclick="addToCart('${product.name}')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                        加入購物車
                    </button>
                </div>
            `;
            return card;
        }

        function addToCart(name) {
            console.log(`Added ${name} to cart`);
            notification.textContent = `「${name}」已加入購物車！`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 初始化頁面
        products.forEach(product => {
            productGrid.appendChild(createProductCard(product));
        });
    </script>
</body>
</html>
