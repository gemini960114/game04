<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精品商品展示 | Premium Gallery</title>
    <meta name="description" content="探索我們精選的頂級商品，體驗極致工藝與美學的結合。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, transparent 70%);
            opacity: 0.3;
            z-index: -1;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        .nav-cart {
            position: relative;
            display: flex;
            align-items: center;
        }

        #cartCount {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .image-container {
            width: 100%;
            height: 240px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            background: #151518;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .product-price {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: block;
        }

        .btn-add {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        #notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            transform: translateY(150%);
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        #notification.show {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">PREMIUM</a>
            <div class="nav-links">
                <a href="index.html" class="active">首頁</a>
                <a href="cart.html" class="nav-cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cartCount">0</span>
                </a>
            </div>
        </div>
    </nav>

    <header>
        <h1>精品生活指南</h1>
        <p>探索專屬您的質感配件，精選來自世界各地的卓越品味。</p>
    </header>

    <main class="container">
        <div class="product-grid" id="productGrid"></div>
    </main>

    <div id="notification">已成功加入購物車！</div>

    <script>
        const products = [
            { id: 1, name: "極簡美學後背包", price: 3200, image: "images/dmytro-koplyk-QKMvmlt_NdU-unsplash.jpg" },
            { id: 2, name: "經典手工皮鞋", price: 5800, image: "images/adrian-valverde-9SZn34Dc6yU-unsplash.jpg" },
            { id: 3, name: "高解析耳機", price: 4500, image: "images/edmund-lou-WEbaj0JmUHU-unsplash.jpg" },
            { id: 4, name: "專業數碼相機", price: 21000, image: "images/glen-carrie-cZYjjCD83vo-unsplash.jpg" },
            { id: 5, name: "商務時尚手錶", price: 8900, image: "images/shiv-d-pDQfIW8kZiw-unsplash.jpg" },
            { id: 6, name: "北歐風皮革配件", price: 1200, image: "images/00001.png" },
            { id: 7, name: "復古設計墨鏡", price: 2600, image: "images/zhen-yao-qm7NBkrIrX8-unsplash.jpg" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        updateCartCount();

        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = (e) => {
                if (e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                    window.location.href = `product_detail.html?id=${product.id}`;
                }
            };
            card.innerHTML = `
                <div class="image-container">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                </div>
                <div class="product-info">
                    <h3>${product.name}</h3>
                    <span class="product-price">NT$ ${product.price.toLocaleString()}</span>
                    <button class="btn-add" onclick="addToCart(event, ${product.id})">
                        加入購物車
                    </button>
                </div>
            `;
            return card;
        }

        function addToCart(event, id) {
            event.stopPropagation();
            const product = products.find(p => p.id === id);
            cart.push(product);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();

            const notification = document.getElementById('notification');
            notification.textContent = `「${product.name}」已加入購物車！`;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        const productGrid = document.getElementById('productGrid');
        products.forEach(p => productGrid.appendChild(createProductCard(p)));
    </script>
</body>

</html>
